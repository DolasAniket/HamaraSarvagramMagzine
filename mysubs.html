<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>My Submissions — Hamara SarvaGram</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Mukta:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--sf:#F47920;--sf-l:#FEF0E6;--bl:#2B398E;--bl-l:#E8EBFB;--gr:#8DC63F;--gr-d:#5E8F1E;--gr-l:#EDF7D6;--bg:#F0F2F8;--ink:#1A1A1A;--mu:#6B6B73;--card:#fff;--bdr:rgba(43,57,142,0.1);--radius:12px;}
body{font-family:'Mukta',sans-serif;background:var(--bg);color:var(--ink);}
.nav{position:sticky;top:0;z-index:500;background:var(--bl);display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:52px;box-shadow:0 2px 16px rgba(0,0,0,.2);}
.nav-brand{font-family:'Playfair Display',serif;font-size:17px;color:#fff;font-weight:700;text-decoration:none;}
.nav-links{display:flex;gap:2px;}
.nav-link{color:rgba(255,255,255,.75);font-size:13px;font-weight:500;padding:6px 12px;border-radius:20px;text-decoration:none;transition:all .15s;}
.nav-link:hover,.nav-link.active{color:#fff;background:rgba(255,255,255,.12);}
.hamburger{display:none;flex-direction:column;gap:4px;background:none;border:none;cursor:pointer;padding:4px;}
.hamburger span{display:block;width:20px;height:2px;background:#fff;border-radius:2px;}
@media(max-width:700px){.nav-links{display:none;}.hamburger{display:flex;}}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:400;}
.overlay.show{display:block;}
.mm{position:fixed;top:0;right:0;width:220px;height:100vh;background:var(--bl);z-index:450;transform:translateX(100%);transition:transform .3s;padding:16px 0;}
.mm.open{transform:none;}
.mm-x{background:none;border:none;color:#fff;font-size:20px;cursor:pointer;padding:0 16px;margin-bottom:12px;display:block;margin-left:auto;}
.mm-item{color:rgba(255,255,255,.8);font-size:14px;padding:10px 20px;text-decoration:none;display:block;}
.mm-item:hover{color:#fff;background:rgba(255,255,255,.1);}

.wrap{max-width:560px;margin:0 auto;padding:20px 16px 80px;}
.pg-head{padding:20px 0 4px;}
.pg-head h1{font-family:'Playfair Display',serif;font-size:24px;color:var(--bl);font-weight:700;margin-bottom:4px;}
.pg-head p{font-size:13px;color:var(--mu);}

.lookup-box{background:var(--card);border-radius:var(--radius);border:.5px solid var(--bdr);padding:16px;margin:16px 0;}
.lookup-label{font-size:13px;font-weight:600;margin-bottom:10px;}
.lookup-row{display:flex;gap:10px;}
.lookup-row input{flex:1;padding:10px 13px;border:1px solid rgba(0,0,0,.12);border-radius:8px;font-size:14px;font-family:'Mukta',sans-serif;outline:none;}
.lookup-row input:focus{border-color:var(--bl);}
.btn-bl{padding:10px 18px;border-radius:8px;background:var(--bl);color:#fff;font-size:14px;font-weight:700;border:none;cursor:pointer;font-family:'Mukta',sans-serif;white-space:nowrap;}

.sp{font-size:11px;padding:3px 10px;border-radius:10px;font-weight:700;}
.sp-pub{background:var(--gr-l);color:var(--gr-d);}
.sp-app{background:#E3F2FD;color:#1565C0;}
.sp-rev{background:var(--sf-l);color:#C9601A;}
.sp-rej{background:#FFEBEE;color:#C62828;}

.sub-card{background:var(--card);border-radius:var(--radius);border:.5px solid var(--bdr);padding:14px 16px;margin-bottom:12px;}
.sc-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:6px;}
.sc-title{font-size:14px;font-weight:700;line-height:1.3;}
.sc-meta{font-size:12px;color:var(--mu);margin-bottom:5px;}
.sc-text{font-size:13px;color:var(--mu);line-height:1.4;margin-bottom:10px;}
.sc-note{background:#FFF3E0;border-radius:8px;padding:8px 12px;font-size:12px;color:#E65100;margin-bottom:10px;}
.sc-sec{font-size:11px;color:var(--bl);font-weight:600;margin-bottom:8px;}
.cat-badge{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:600;background:var(--bl-l);color:var(--bl);}

.track{display:flex;align-items:center;}
.tr-step{display:flex;flex-direction:column;align-items:center;gap:3px;flex:1;}
.tr-dot{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;}
.td-done{background:var(--gr);color:#fff;}
.td-cur{background:var(--sf);color:#fff;}
.td-rej{background:#C62828;color:#fff;}
.td-idle{background:var(--bg);border:2px solid var(--bdr);color:var(--mu);}
.tr-line{flex:1;height:2px;margin:0 -1px;margin-bottom:16px;}
.tl-done{background:var(--gr);}
.tl-rej{background:#C62828;}
.tl-idle{background:var(--bdr);}
.tr-label{font-size:9px;color:var(--mu);text-transform:uppercase;letter-spacing:.04em;text-align:center;}

.loader{text-align:center;padding:32px;color:var(--mu);}
.spinner{display:inline-block;width:18px;height:18px;border:2px solid var(--bdr);border-top-color:var(--bl);border-radius:50%;animation:spin .7s linear infinite;margin-right:6px;vertical-align:middle;}
@keyframes spin{to{transform:rotate(360deg);}}
.empty{text-align:center;padding:40px 20px;color:var(--mu);font-size:13px;}
.empty-icon{font-size:40px;margin-bottom:12px;}

.bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--bdr);padding:6px 0 10px;z-index:300;}
@media(max-width:700px){.bottom-nav{display:flex;}body{padding-bottom:64px;}}
.bn-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:1px;cursor:pointer;padding:2px 0;color:var(--mu);font-size:10px;background:none;border:none;font-family:'Mukta',sans-serif;}
.bn-item.active{color:var(--bl);}
.bn-icon{font-size:20px;}
</style>
</head>
<body>
<div class="overlay" id="overlay" onclick="closeMM()"></div>
<div class="mm" id="mm">
  <button class="mm-x" onclick="closeMM()">✕</button>
  <a class="mm-item" href="index.html">📰 Magazine</a>
  <a class="mm-item" href="submit.html">✏️ Submit Thought</a>
  <a class="mm-item" href="mysubs.html">📋 My Submissions</a>
</div>
<nav class="nav">
  <div style="display:flex;align-items:center;gap:10px;">
    <button class="hamburger" onclick="openMM()"><span></span><span></span><span></span></button>
    <a class="nav-brand" href="index.html">Hamara SarvaGram</a>
  </div>
  <div class="nav-links">
    <a class="nav-link" href="index.html">Magazine</a>
    <a class="nav-link" href="submit.html">Submit</a>
    <a class="nav-link active" href="mysubs.html">My Submissions</a>
  </div>
</nav>

<div class="wrap">
  <div class="pg-head"><h1>My Submissions</h1><p>Track the status of your contributions.</p></div>
  <div class="lookup-box">
    <div class="lookup-label">Enter your Employee ID to see your submissions</div>
    <div class="lookup-row">
      <input type="text" id="emp-input" placeholder="e.g. EMP-1042" onkeydown="if(event.key==='Enter')lookup()"/>
      <button class="btn-bl" onclick="lookup()">Look Up</button>
    </div>
  </div>
  <div id="results"></div>
</div>

<nav class="bottom-nav">
  <button class="bn-item" onclick="location.href='index.html'"><div class="bn-icon">📰</div>Feed</button>
  <button class="bn-item" onclick="location.href='submit.html'"><div class="bn-icon">✏️</div>Submit</button>
  <button class="bn-item active"><div class="bn-icon">📋</div>Mine</button>
</nav>

<script src="supabase.js"></script>
<script>
const statusMeta={pending:{label:'Under Review',pill:'sp-rev',step:1},approved:{label:'Approved',pill:'sp-app',step:2},rejected:{label:'Not Selected',pill:'sp-rej',step:1},published:{label:'Published',pill:'sp-pub',step:3}};
const catLabels={thought:'Thought',idea:'Idea',achievement:'Achievement',announcement:'Announcement',story:'Field Story',feedback:'Feedback'};
const zoneNames={all:'All Zones',gujarat:'Gujarat',karnataka:'Karnataka',maharashtra:'Maharashtra',rajasthan:'Rajasthan',telangana:'Telangana'};
const sectionNames={'top-highlight':'Top Highlight','whats-new':"What's New",achievements:'Achievements',ideas:'Ideas',spotlight:'Spotlight','on-ground':'On-Ground','quick-bytes':'Quick Bytes','zone-news':'Zone News'};

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function ago(dt){const d=Math.floor((Date.now()-new Date(dt))/864e5);return d<=0?'Today':d===1?'Yesterday':d+'d ago';}

function buildTrack(status){
  const steps=['Submitted','In Review','Approved','Published'];
  const sm=statusMeta[status]||statusMeta.pending;
  const isRej=status==='rejected';
  let html='<div class="track">';
  steps.forEach((label,i)=>{
    let dc='td-idle',lc='tl-idle';
    if(isRej){if(i===0){dc='td-done';lc='tl-done';}else if(i===1)dc='td-rej';}
    else{if(i<sm.step){dc='td-done';lc='tl-done';}else if(i===sm.step)dc='td-cur';}
    const sym=isRej&&i===1?'✗':i<sm.step&&!isRej?'✓':i===sm.step&&!isRej?'●':'○';
    html+=`<div class="tr-step"><div class="tr-dot ${dc}">${sym}</div><div class="tr-label">${label}</div></div>`;
    if(i<steps.length-1)html+=`<div class="tr-line ${lc}"></div>`;
  });
  return html+'</div>';
}

async function lookup(){
  const empId=document.getElementById('emp-input').value.trim();
  if(!empId){document.getElementById('results').innerHTML='<div class="empty"><div class="empty-icon">🔍</div>Please enter your Employee ID.</div>';return;}
  document.getElementById('results').innerHTML='<div class="loader"><span class="spinner"></span>Loading…</div>';
  try{
    const subs=await SG.getMySubmissions(empId);
    if(!subs.length){
      document.getElementById('results').innerHTML=`<div class="empty"><div class="empty-icon">📭</div>No submissions found for <strong>${esc(empId)}</strong>.<br/><br/><a href="submit.html" style="color:var(--bl);font-weight:600;">Submit your first thought →</a></div>`;
      return;
    }
    let html=`<div style="font-size:13px;color:var(--mu);margin-bottom:12px;"><strong>${subs.length}</strong> submission${subs.length!==1?'s':''} found for <strong>${esc(empId)}</strong></div>`;
    subs.forEach(s=>{
      const sm=statusMeta[s.status]||statusMeta.pending;
      html+=`<div class="sub-card">
        <div class="sc-top"><div class="sc-title">${esc(s.title)}</div><span class="sp ${sm.pill}">${sm.label}</span></div>
        <div class="sc-meta">${ago(s.created_at)} · <span class="cat-badge">${catLabels[s.category]||s.category}</span> · ${zoneNames[s.zone_slug]||s.zone_slug}</div>
        <div class="sc-text">${esc((s.content||'').slice(0,120))}${s.content&&s.content.length>120?'…':''}</div>
        ${s.status==='rejected'&&s.admin_note?`<div class="sc-note">ℹ️ ${esc(s.admin_note)}</div>`:''}
        ${s.status==='published'&&s.section_slug?`<div class="sc-sec">📰 Published in: ${sectionNames[s.section_slug]||s.section_slug}</div>`:''}
        ${buildTrack(s.status)}
      </div>`;
    });
    document.getElementById('results').innerHTML=html;
  }catch(e){
    document.getElementById('results').innerHTML='<div class="empty">Could not load submissions. Please try again.</div>';
  }
}

const urlEmp=new URLSearchParams(location.search).get('emp');
if(urlEmp){document.getElementById('emp-input').value=urlEmp;lookup();}
function openMM(){document.getElementById('mm').classList.add('open');document.getElementById('overlay').classList.add('show');}
function closeMM(){document.getElementById('mm').classList.remove('open');document.getElementById('overlay').classList.remove('show');}
</script>
</body>
</html>
